# Alembic configuration for P-Insight.
# The database URL is intentionally NOT set here — env.py reads it from
# app.core.config.settings.DATABASE_URL so there is a single source of truth
# (SQLite locally, PostgreSQL in staging/production).

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Migration filenames: <date>_<rev>_<slug>
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
